name: OSS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  desktop-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm run desktop:install

      - name: Desktop typecheck
        run: npm run desktop:typecheck

  runtime-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            runtime/api-server/package-lock.json
            runtime/state-store/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install runtime state store dependencies
        run: npm --prefix runtime/state-store ci

      - name: Build runtime state store
        run: npm --prefix runtime/state-store run build

      - name: Install runtime API server dependencies
        run: npm --prefix runtime/api-server ci

      - name: Build runtime API server
        run: npm --prefix runtime/api-server run build

      - name: Runtime tests
        run: npm run runtime:test

  runtime-api-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            runtime/api-server/package-lock.json
            runtime/state-store/package-lock.json

      - name: Install runtime API server dependencies
        run: npm --prefix runtime/api-server ci

      - name: Install runtime state store dependencies
        run: npm --prefix runtime/state-store ci

      - name: Build runtime state store
        run: npm --prefix runtime/state-store run build

      - name: Runtime API server typecheck
        run: npm --prefix runtime/api-server run typecheck

      - name: Runtime API server tests
        run: npm --prefix runtime/api-server run test

      - name: Runtime API server build
        run: npm --prefix runtime/api-server run build
