name: Publish Runtime Bundles

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "runtime/deploy/**"
      - "runtime/src/**"
      - "runtime/pyproject.toml"
      - "runtime/uv.lock"
      - ".github/workflows/publish-runtime-bundles.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-runtime-bundles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ensure-runtime-release:
    name: Ensure runtime release exists
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_title: ${{ steps.release_meta.outputs.release_title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute release metadata
        id: release_meta
        run: |
          release_date="$(date -u +'%Y.%-m.%-d')"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            release_tag="holaboss-${release_date}"
            release_title="Holaboss ${release_date}"
          else
            release_tag="holaboss-${GITHUB_REF_NAME}-${release_date}"
            release_title="Holaboss ${GITHUB_REF_NAME} ${release_date}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
          } >> "${GITHUB_OUTPUT}"

      - name: Ensure runtime release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
        run: |
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            prerelease_flag=()
            if [ "${GITHUB_REF_NAME}" != "main" ]; then
              prerelease_flag+=(--prerelease)
            fi
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes "Versioned desktop runtime bundles for ${GITHUB_REF_NAME}." \
              --target "${GITHUB_SHA}" \
              "${prerelease_flag[@]}"
          fi

  publish-macos-runtime:
    name: Build macOS runtime bundle
    needs: ensure-runtime-release
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-runtime-release.outputs.release_tag }}
      RELEASE_TITLE: ${{ needs.ensure-runtime-release.outputs.release_title }}
      OUTPUT_DIR: runtime-macos
      ASSET_PREFIX: holaboss-runtime-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install uv
        run: |
          "${{ env.pythonLocation }}/bin/python" -m pip install uv

      - name: Build macOS runtime bundle
        env:
          HOLABOSS_MACOS_PYTHON_BIN: ${{ env.pythonLocation }}/bin/python
        run: |
          bash runtime/deploy/package_macos_runtime.sh "out/${OUTPUT_DIR}"

      - name: Archive macOS runtime bundle
        run: |
          tar -C out -czf "out/${ASSET_PREFIX}-${GITHUB_SHA}.tar.gz" "${OUTPUT_DIR}"

      - name: Upload macOS runtime bundle release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            "out/${ASSET_PREFIX}-${GITHUB_SHA}.tar.gz" \
            --clobber

      - name: Upload macOS runtime bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_PREFIX }}-${{ github.sha }}
          path: |
            out/${{ env.ASSET_PREFIX }}-${{ github.sha }}.tar.gz
            out/${{ env.OUTPUT_DIR }}/package-metadata.json
            out/${{ env.OUTPUT_DIR }}/runtime/metadata.json
          if-no-files-found: error

  publish-macos-desktop-dmg:
    name: Build macOS desktop DMG
    needs:
      - ensure-runtime-release
      - publish-macos-runtime
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-runtime-release.outputs.release_tag }}
      RUNTIME_ARTIFACT_NAME: holaboss-runtime-macos-${{ github.sha }}
      DESKTOP_ASSET_PREFIX: holaboss-desktop-macos
      MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
      MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            desktop/package-lock.json

      - name: Download macOS runtime artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.RUNTIME_ARTIFACT_NAME }}
          path: out/runtime-artifact

      - name: Install desktop dependencies
        run: npm run desktop:install

      - name: Build unsigned macOS desktop DMG
        if: ${{ env.MAC_CERTIFICATE == '' || env.MAC_CERTIFICATE_PASSWORD == '' || env.APPLE_ID == '' || env.APPLE_APP_SPECIFIC_PASSWORD == '' || env.APPLE_TEAM_ID == '' }}
        working-directory: desktop
        env:
          HOLABOSS_RUNTIME_TARBALL: ${{ github.workspace }}/out/runtime-artifact/holaboss-runtime-macos-${{ github.sha }}.tar.gz
          GITHUB_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm run prepare:runtime
          npm run build
          npx electron-builder --projectDir "$PWD" --publish never --mac dmg --arm64 -c.mac.identity=null

      - name: Build signed and notarized macOS desktop DMG
        if: ${{ env.MAC_CERTIFICATE != '' && env.MAC_CERTIFICATE_PASSWORD != '' && env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' && env.APPLE_TEAM_ID != '' }}
        working-directory: desktop
        env:
          HOLABOSS_RUNTIME_TARBALL: ${{ github.workspace }}/out/runtime-artifact/holaboss-runtime-macos-${{ github.sha }}.tar.gz
          GITHUB_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ env.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ env.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ env.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
        run: |
          npm run prepare:runtime
          npm run build
          npx electron-builder --projectDir "$PWD" --publish never --mac dmg --arm64

      - name: Upload macOS desktop DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DESKTOP_ASSET_PREFIX }}-${{ github.sha }}
          path: desktop/out/release/*.dmg
          if-no-files-found: error

      - name: Upload macOS desktop DMG release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            desktop/out/release/*.dmg \
            --clobber

  publish-linux-runtime:
    name: Build Linux runtime bundle
    needs: ensure-runtime-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-runtime-release.outputs.release_tag }}
      RELEASE_TITLE: ${{ needs.ensure-runtime-release.outputs.release_title }}
      OUTPUT_DIR: runtime-linux
      ASSET_PREFIX: holaboss-runtime-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install uv
        run: |
          "${{ env.pythonLocation }}/bin/python" -m pip install uv

      - name: Build Linux runtime bundle
        env:
          HOLABOSS_LINUX_PYTHON_BIN: ${{ env.pythonLocation }}/bin/python
        run: |
          bash runtime/deploy/package_linux_runtime.sh "out/${OUTPUT_DIR}"

      - name: Archive Linux runtime bundle
        run: |
          tar -C out -czf "out/${ASSET_PREFIX}-${GITHUB_SHA}.tar.gz" "${OUTPUT_DIR}"

      - name: Upload Linux runtime bundle release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            "out/${ASSET_PREFIX}-${GITHUB_SHA}.tar.gz" \
            --clobber

      - name: Upload Linux runtime bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_PREFIX }}-${{ github.sha }}
          path: |
            out/${{ env.ASSET_PREFIX }}-${{ github.sha }}.tar.gz
            out/${{ env.OUTPUT_DIR }}/package-metadata.json
            out/${{ env.OUTPUT_DIR }}/runtime/metadata.json
          if-no-files-found: error
