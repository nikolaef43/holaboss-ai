name: Publish Runtime Bundles

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "runtime/**"
      - ".github/workflows/publish-runtime-bundles.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-runtime-bundles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ensure-runtime-release:
    name: Ensure runtime release exists
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_title: ${{ steps.release_meta.outputs.release_title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: release_meta
        run: |
          release_date="$(date -u +'%Y.%-m.%-d')"
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            release_tag="holaboss-${release_date}"
            release_title="Holaboss ${release_date}"
          else
            release_tag="holaboss-${GITHUB_REF_NAME}-${release_date}"
            release_title="Holaboss ${GITHUB_REF_NAME} ${release_date}"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
          } >> "${GITHUB_OUTPUT}"

      - name: Ensure runtime release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
        run: |
          notes_path="$(mktemp)"
          trap 'rm -f "${notes_path}"' EXIT

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            release_pattern='holaboss-[0-9]*'
          else
            release_pattern="holaboss-${GITHUB_REF_NAME}-*"
          fi

          previous_tag="$(
            git tag --list "${release_pattern}" --sort=-creatordate \
              | grep -Fxv "${RELEASE_TAG}" \
              | head -n1 || true
          )"

          generate_notes_args=(
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            --method POST
            -f "tag_name=${RELEASE_TAG}"
            -f "target_commitish=${GITHUB_SHA}"
          )
          if [ -n "${previous_tag}" ]; then
            generate_notes_args+=(-f "previous_tag_name=${previous_tag}")
          fi

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh api "${generate_notes_args[@]}" --jq '.body' > "${notes_path}"

            prerelease_flag=()
            if [ "${GITHUB_REF_NAME}" != "main" ]; then
              prerelease_flag+=(--prerelease)
            fi
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${notes_path}" \
              --target "${GITHUB_SHA}" \
              "${prerelease_flag[@]}"
          else
            tag_ref="repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
            if gh api "${tag_ref}" >/dev/null 2>&1; then
              gh api "${tag_ref}" \
                --method PATCH \
                -f "sha=${GITHUB_SHA}" \
                -F force=true >/dev/null
            else
              gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
                --method POST \
                -f "ref=refs/tags/${RELEASE_TAG}" \
                -f "sha=${GITHUB_SHA}" >/dev/null
            fi

            gh api "${generate_notes_args[@]}" --jq '.body' > "${notes_path}"

            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${notes_path}" \
              --target "${GITHUB_SHA}"
          fi

  publish-macos-runtime:
    name: Build macOS runtime bundle
    needs: ensure-runtime-release
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-runtime-release.outputs.release_tag }}
      RELEASE_TITLE: ${{ needs.ensure-runtime-release.outputs.release_title }}
      OUTPUT_DIR: runtime-macos
      ASSET_PREFIX: holaboss-runtime-macos
      RELEASE_ASSET_NAME: holaboss-runtime-macos.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build macOS runtime bundle
        run: |
          bash runtime/deploy/package_macos_runtime.sh "out/${OUTPUT_DIR}"

      - name: Archive macOS runtime bundle
        run: |
          tar -C out -czf "out/${RELEASE_ASSET_NAME}" "${OUTPUT_DIR}"

      - name: Upload macOS runtime bundle release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            "out/${RELEASE_ASSET_NAME}" \
            --clobber

      - name: Upload macOS runtime bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_PREFIX }}-${{ github.sha }}
          path: |
            out/${{ env.RELEASE_ASSET_NAME }}
            out/${{ env.OUTPUT_DIR }}/package-metadata.json
            out/${{ env.OUTPUT_DIR }}/runtime/metadata.json
          if-no-files-found: error

  publish-linux-runtime:
    name: Build Linux runtime bundle
    needs: ensure-runtime-release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-runtime-release.outputs.release_tag }}
      RELEASE_TITLE: ${{ needs.ensure-runtime-release.outputs.release_title }}
      OUTPUT_DIR: runtime-linux
      ASSET_PREFIX: holaboss-runtime-linux
      RELEASE_ASSET_NAME: holaboss-runtime-linux.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build Linux runtime bundle
        run: |
          bash runtime/deploy/package_linux_runtime.sh "out/${OUTPUT_DIR}"

      - name: Archive Linux runtime bundle
        run: |
          tar -C out -czf "out/${RELEASE_ASSET_NAME}" "${OUTPUT_DIR}"

      - name: Upload Linux runtime bundle release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            "out/${RELEASE_ASSET_NAME}" \
            --clobber

      - name: Upload Linux runtime bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_PREFIX }}-${{ github.sha }}
          path: |
            out/${{ env.RELEASE_ASSET_NAME }}
            out/${{ env.OUTPUT_DIR }}/package-metadata.json
            out/${{ env.OUTPUT_DIR }}/runtime/metadata.json
          if-no-files-found: error
