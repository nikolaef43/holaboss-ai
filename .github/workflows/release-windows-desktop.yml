name: Release Windows Desktop

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: true
        default: main
        type: string
      release_tag:
        description: GitHub release tag to create or update
        required: true
        type: string
      release_title:
        description: Optional GitHub release title (defaults to the tag)
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease when first created
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-windows-desktop-${{ inputs.release_tag }}
  cancel-in-progress: true

jobs:
  ensure-release:
    name: Ensure desktop release exists
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.release_meta.outputs.release_ref }}
      release_sha: ${{ steps.release_meta.outputs.release_sha }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_title: ${{ steps.release_meta.outputs.release_title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Compute release metadata
        id: release_meta
        run: |
          release_title="${{ inputs.release_title }}"
          if [ -z "${release_title}" ]; then
            release_title="${{ inputs.release_tag }}"
          fi

          {
            echo "release_ref=${{ inputs.ref }}"
            echo "release_sha=$(git rev-parse HEAD)"
            echo "release_tag=${{ inputs.release_tag }}"
            echo "release_title=${release_title}"
          } >> "${GITHUB_OUTPUT}"

      - name: Ensure desktop release exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release_meta.outputs.release_sha }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          notes_path="$(mktemp)"
          trap 'rm -f "${notes_path}"' EXIT

          existing_tag_sha="$(git rev-list -n1 "${RELEASE_TAG}" 2>/dev/null || true)"
          if [ -n "${existing_tag_sha}" ] && [ "${existing_tag_sha}" != "${RELEASE_SHA}" ]; then
            echo "release tag ${RELEASE_TAG} already points to ${existing_tag_sha}, not ${RELEASE_SHA}" >&2
            exit 1
          fi

          generate_notes_args=(
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes"
            --method POST
            -f "tag_name=${RELEASE_TAG}"
            -f "target_commitish=${RELEASE_SHA}"
          )

          if ! git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              --method POST \
              -f "ref=refs/tags/${RELEASE_TAG}" \
              -f "sha=${RELEASE_SHA}" >/dev/null
          fi

          gh api "${generate_notes_args[@]}" --jq '.body' > "${notes_path}"

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            prerelease_flag=()
            if [ "${PRERELEASE}" = "true" ]; then
              prerelease_flag+=(--prerelease)
            fi

            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${notes_path}" \
              "${prerelease_flag[@]}"
          else
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file "${notes_path}"
          fi

  release-windows-desktop:
    name: Build Windows desktop installer
    needs: ensure-release
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      DESKTOP_ASSET_PREFIX: holaboss-desktop-windows
      DESKTOP_RELEASE_ASSET_NAME: Holaboss-windows-x64-setup.exe
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.ensure-release.outputs.release_ref }}

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sdk/app-sdk/package-lock.json
            desktop/package-lock.json

      - name: Prepare desktop (build SDK + install desktop deps)
        run: npm run desktop:prepare

      - name: Build Windows desktop installer
        id: build_windows_installer
        working-directory: desktop
        shell: pwsh
        env:
          HOLABOSS_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          HOLABOSS_AUTH_BASE_URL: ${{ vars.HOLABOSS_AUTH_BASE_URL }}
          HOLABOSS_AUTH_SIGN_IN_URL: ${{ vars.HOLABOSS_AUTH_SIGN_IN_URL }}
          HOLABOSS_BACKEND_BASE_URL: ${{ vars.HOLABOSS_BACKEND_BASE_URL }}
          HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL: ${{ vars.HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL }}
          HOLABOSS_PROJECTS_URL: ${{ vars.HOLABOSS_PROJECTS_URL }}
          HOLABOSS_MARKETPLACE_URL: ${{ vars.HOLABOSS_MARKETPLACE_URL }}
          HOLABOSS_PROACTIVE_URL: ${{ vars.HOLABOSS_PROACTIVE_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ env.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
          WIN_CSC_LINK: ${{ env.WINDOWS_CERTIFICATE }}
          WIN_CSC_KEY_PASSWORD: ${{ env.WINDOWS_CERTIFICATE_PASSWORD }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "Windows desktop release requires WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD so the public installer is code-signed."
          }

          Write-Host "Building signed Windows installer."

          npm run dist:win:local

          $installer = Get-ChildItem -Path out/release -File -Recurse |
            Where-Object {
              $_.Extension -eq ".exe" -and
              $_.Name -notmatch "unins|elevate" -and
              $_.FullName -notmatch "win-unpacked"
            } |
            Sort-Object Length -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "No Windows installer .exe was produced under desktop/out/release."
          }

          $installerPath = $installer.FullName
          $stablePath = Join-Path $PWD "out/release/$env:DESKTOP_RELEASE_ASSET_NAME"
          Copy-Item -LiteralPath $installerPath -Destination $stablePath -Force
          Add-Content -Path $env:GITHUB_OUTPUT -Value "generated_installer_path=$installerPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "installer_path=$stablePath"

      - name: Upload Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: desktop
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: holaboss-desktop
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "${{ env.RELEASE_TAG }}" \
            --url-prefix "~/" \
            out/dist out/dist-electron

      - name: Validate Windows auto-update artifacts
        shell: pwsh
        run: |
          $manifestPath = Join-Path $PWD "desktop/out/release/latest.yml"
          if (-not (Test-Path -LiteralPath $manifestPath)) {
            throw "latest.yml was not generated"
          }

          $blockmaps = Get-ChildItem -Path desktop/out/release -File -Filter *.blockmap
          if (-not $blockmaps) {
            throw "No Windows blockmap was produced under desktop/out/release."
          }

      - name: Upload Windows desktop installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DESKTOP_ASSET_PREFIX }}-${{ inputs.release_tag }}
          path: |
            desktop/out/release/*.exe
            desktop/out/release/*.yml
            desktop/out/release/*.blockmap
          if-no-files-found: error

      - name: Upload Windows desktop installer release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GENERATED_INSTALLER_PATH: ${{ steps.build_windows_installer.outputs.generated_installer_path }}
          INSTALLER_PATH: ${{ steps.build_windows_installer.outputs.installer_path }}
        run: |
          if (-not $env:INSTALLER_PATH) {
            throw "Installer path output was not set."
          }

          if (-not $env:GENERATED_INSTALLER_PATH) {
            throw "Generated installer path output was not set."
          }

          $manifestPath = Join-Path $PWD "desktop/out/release/latest.yml"
          if (-not (Test-Path -LiteralPath $manifestPath)) {
            throw "latest.yml was not generated"
          }

          $uploadPaths = @($env:INSTALLER_PATH)
          if ($env:GENERATED_INSTALLER_PATH -ne $env:INSTALLER_PATH) {
            $uploadPaths += $env:GENERATED_INSTALLER_PATH
          }
          $uploadPaths += $manifestPath

          $blockmapPaths = Get-ChildItem -Path desktop/out/release -File -Filter *.blockmap |
            ForEach-Object { $_.FullName }
          if (-not $blockmapPaths) {
            throw "No Windows blockmap was produced under desktop/out/release."
          }
          $uploadPaths += $blockmapPaths

          gh release upload $env:RELEASE_TAG @uploadPaths --clobber
