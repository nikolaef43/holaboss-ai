name: Publish Sandbox Images

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "runtime/deploy/**"
      - ".github/workflows/publish-sandbox-images.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sandbox-images-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_TOOLCHAIN_IMAGE: ghcr.io/${{ github.repository_owner }}/holaboss-sandbox-base-toolchain
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/holaboss-sandbox-base

jobs:
  publish-ghcr:
    name: Publish docker_container image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR toolchain image (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: runtime/deploy/Dockerfile.toolchain
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_TOOLCHAIN_IMAGE }}:latest
            ${{ env.GHCR_TOOLCHAIN_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=sandbox-toolchain-ghcr
          cache-to: type=gha,mode=max,scope=sandbox-toolchain-ghcr

      - name: Build and push GHCR runtime image (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: runtime/deploy/Dockerfile
          build-args: |
            TOOLCHAIN_IMAGE=${{ env.GHCR_TOOLCHAIN_IMAGE }}:${{ github.sha }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=sandbox-runtime-ghcr
          cache-to: type=gha,mode=max,scope=sandbox-runtime-ghcr

      - name: Verify GHCR image
        run: docker buildx imagetools inspect "${GHCR_IMAGE}:${GITHUB_SHA}"
